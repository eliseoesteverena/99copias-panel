compatibility_date = "2026-07-23"
pages_build_output_dir = "public"

# ---------- Notificaciones push ----------
# La clave pública VAPID y el "subject" no son sensibles (la pública va
# embebida en public/js/push.js igual) — van acá como variables normales.
# Lo que SÍ tiene que mantenerse secreto es la clave PRIVADA y el secreto
# del webhook — esos van como Cloudflare secret, nunca en este archivo
# (no se commitea a git). Configuralos con:
#   wrangler pages secret put VAPID_PRIVATE_KEY
#   wrangler pages secret put WEBHOOK_SECRET
# (o desde el dashboard: Settings → Environment variables → Secret)
# Ver README para instrucciones completas, incluida cómo generar tu propio
# par de claves VAPID si no querés usar el que se generó para esta entrega.
