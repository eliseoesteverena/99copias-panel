<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pedidos — Panel 99copias</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/pedidos.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2453d9">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="99copias admin">
<link rel="icon" href="/icons/favicon-64.png">
</head>
<body>

<header class="top-nav">
  <div class="marca"><span class="punto"></span>99copias · admin</div>
  <nav>
    <a href="/index.html" class="activo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="1.5"/><path d="M3 12h5l1.5 2.5h5L16 12h5"/><path d="M8 7 9.5 3.5h5L16 7"/></svg>
      Pedidos
    </a>
    <a href="/catalogo.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>
      Catálogo
    </a>
    <a href="/turnos.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/></svg>
      Turnos
    </a>
  </nav>
  <div class="top-nav-acciones">
    <button id="btn-notificaciones" class="icono-boton" title="Activar notificaciones de pedidos nuevos" aria-pressed="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 4 1.5 5.5 2 6H4c.5-.5 2-2 2-6Z"/><path d="M10 21a2 2 0 0 0 4 0"/></svg>
    </button>
    <button id="btn-instalar" class="icono-boton oculto" title="Instalar la app">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7.5 10.5 12 15l4.5-4.5"/><path d="M5 21h14"/></svg>
    </button>
  </div>
</header>

<div class="pedidos-layout">

  <!-- ---------- Columna izquierda: filtros + lista ---------- -->
  <aside class="pedidos-lista-col">
    <div class="filtros">
      <div class="filtros-barra">
        <div class="buscador">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="f-buscar" placeholder="Buscar por cliente o DNI…">
        </div>
        <button class="chico" id="btn-toggle-filtros" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg>
          Filtros
          <span class="chip-contador oculto" id="filtros-contador">0</span>
        </button>
      </div>

      <div class="chips-activos oculto" id="chips-activos"></div>

      <div class="filtros-panel oculto" id="filtros-panel">
        <select id="f-estado">
          <option value="">Todos los estados</option>
          <option value="pendiente">Pendiente</option>
          <option value="en_proceso">En proceso</option>
          <option value="listo">Listo</option>
          <option value="entregado">Entregado</option>
        </select>
        <select id="f-pagado">
          <option value="">Pagado / No pagado</option>
          <option value="1">Pagado</option>
          <option value="0">No pagado</option>
        </select>
        <select id="f-envio">
          <option value="">Envío / Retiro</option>
          <option value="1">Con envío</option>
          <option value="0">Retiro / sin envío</option>
        </select>
        <select id="f-zona">
          <option value="">Todas las zonas</option>
        </select>
        <select id="f-categoria">
          <option value="">Todas las categorías</option>
        </select>
        <div class="filtros-fechas">
          <input type="date" id="f-fecha-desde" title="Entrega desde">
          <span class="filtros-fechas-guion">–</span>
          <input type="date" id="f-fecha-hasta" title="Entrega hasta">
        </div>
        <button id="btn-limpiar-filtros" class="chico fantasma">Limpiar todo</button>
      </div>
    </div>

    <div id="lista-estado" class="mensaje oculto"></div>
    <div id="lista-pedidos" class="lista-pedidos"></div>
  </aside>

  <!-- ---------- Columna derecha: detalle del pedido seleccionado ---------- -->
  <main class="pedidos-detalle-col" id="detalle-col">
    <div class="vacio">Elegí un pedido de la lista para ver el detalle.</div>
  </main>

</div>

<script src="/js/api.js"></script>
<script src="/js/push.js"></script>
<script src="/js/pedidos.js"></script>
</body>
</html>
